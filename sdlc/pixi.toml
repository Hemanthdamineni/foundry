[workspace]
name = "sdlc"
version = "0.1.0"
channels = ["conda-forge"]
platforms = ["linux-64"]

[activation.env]
PYTHONPATH = ".."

[tasks]
lint = "ruff check ."
typecheck = "mypy --exclude='tests|.pixi|.venv|.git|data|configs|graphs|docs|agents|.opencode|archive|latest' ."
test = "pytest -v"
all = { depends-on = ["lint", "typecheck", "test"] }
clean = "rm -rf .ruff_cache .mypy_cache .pytest_cache __pycache__ sdlc/__pycache__ tests/__pycache__"

[dependencies]
python = ">=3.12"
pip = "*"
pydantic = ">=2.0.0"
pyyaml = ">=6.0"
aiosqlite = ">=0.20.0"
httpx = ">=0.27.0"
pydantic-settings = ">=2.0.0"

[pypi-dependencies]
ruff = ">=0.9.0"
mypy = ">=1.15.0"
pytest = ">=8.0.0"
pytest-asyncio = ">=0.24.0"
pre-commit = ">=4.0.0"
mcp = ">=1.0.0"

[feature.test.dependencies]
pytest = "*"
pytest-asyncio = "*"

[environments]
default = { solve-group = "default" }
test = { features = ["test"], solve-group = "default" }
